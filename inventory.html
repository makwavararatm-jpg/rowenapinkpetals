<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowena Pink Petals | Finished Inventory</title>
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { display: flex; height: 100vh; background-color: #F4F6F8; }
        
        /* Sidebar Styles (Same as Dashboard) */
        .sidebar { width: 250px; background-color: #1E293B; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background-color: #0F172A; text-align: center; border-bottom: 2px solid #D81B60; }
        .sidebar-header h2 { font-size: 1.2rem; color: #D81B60; }
        .sidebar-header p { font-size: 0.8rem; color: #94A3B8; }
        .nav-links { list-style: none; padding: 20px 0; flex-grow: 1; }
        .nav-links li { padding: 15px 25px; cursor: pointer; transition: 0.3s; color: #CBD5E1; }
        .nav-links li:hover, .nav-links li.active { background-color: #334155; color: white; border-left: 4px solid #D81B60; }
        .logout-btn { background-color: #D81B60; color: white; border: none; padding: 15px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .logout-btn:hover { background-color: #AD1457; }

        /* Main Content Styles */
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 10px; border-bottom: 1px solid #E2E8F0; }
        
        /* Data Entry Form Styles */
        .form-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 500px;
            border-top: 5px solid #D81B60;
        }
        .form-card h3 { color: #334155; margin-bottom: 20px; }
        
        label { display: block; margin-bottom: 8px; color: #64748B; font-weight: bold; font-size: 0.9rem; }
        select, input {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border: 1px solid #CBD5E1; border-radius: 6px; font-size: 1rem;
        }
        select:focus, input:focus { outline: none; border-color: #D81B60; }
        
        .submit-btn {
            width: 100%; padding: 15px; background-color: #D81B60;
            color: white; border: none; border-radius: 6px; font-size: 1rem;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { background-color: #AD1457; }
        
        #status-msg { margin-top: 15px; font-weight: bold; text-align: center; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>RPP MIS</h2>
            <p>Godview Active</p>
        </div>
        <ul class="nav-links">
            <li onclick="window.location.href='dashboard.html'">Overview Dashboard</li>
            <li onclick="window.location.href='raw_materials.html'">Raw Materials (Factory)</li>
            <li onclick="window.location.href='production_tracking.html'">Production Tracking</li>
            <li class="active">Finished Inventory</li>
            <li onclick="window.location.href='pos.html'">POS & Sales Ledger</li>
            <li onclick="window.location.href='audit.html'">Financials & Audit</li>
            <li onclick="window.location.href='finance.html'">P&L & Compliance</li>
        </ul>
        <button class="logout-btn" id="logout-btn">Log Out</button>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1>Log Finished Goods</h1>
            <p id="user-email-display">Loading...</p>
        </div>

        <div class="form-card">
            <h3>Add to Warehouse</h3>
            
            <label for="product-type">Product SKU</label>
            <select id="product-type">
                <option value="4-pack">4-Pack Tissues</option>
                <option value="9-pack">9-Pack Tissues</option>
                <option value="18-pack">18-Pack Jumbo Tissues</option>
            </select>

            <label for="quantity">Quantity Produced (Units)</label>
            <input type="number" id="quantity" placeholder="e.g., 50" min="1" required>

            <button class="submit-btn" id="log-production-btn">Log Production</button>
            <p id="status-msg"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyM_luoUqilYNG-GPn7Gxb_Eo5ewVWB5Q",
            authDomain: "rowena-pink-petals.firebaseapp.com",
            projectId: "rowena-pink-petals",
            storageBucket: "rowena-pink-petals.firebasestorage.app",
            messagingSenderId: "925796017219",
            appId: "1:925796017219:web:bf7eee185905b9c9ece0f6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserEmail = "";

        // Security Check
        onAuthStateChanged(auth, (user) => {
            if (user) {
                user.getIdTokenResult().then((idTokenResult) => {
                    if (idTokenResult.claims.role === 'owner' || idTokenResult.claims.role === 'admin' || idTokenResult.claims.role === 'production') {
                        document.getElementById('user-email-display').innerText = `Logged in as: ${user.email}`;
                        currentUserEmail = user.email;
                    } else {
                        // FIX: Updated route
                        signOut(auth).then(() => window.location.href = "index.html");
                    }
                });
            } else {
                // FIX: Updated route
                window.location.href = "index.html";
            }
        });

        // Write to Database Function
        document.getElementById('log-production-btn').addEventListener('click', async () => {
            const product = document.getElementById('product-type').value;
            const quantity = document.getElementById('quantity').value;
            const statusMsg = document.getElementById('status-msg');

            if (!quantity || quantity <= 0) {
                statusMsg.style.color = "red";
                statusMsg.innerText = "Please enter a valid quantity.";
                return;
            }

            statusMsg.style.color = "#334155";
            statusMsg.innerText = "Connecting to database...";

            try {
                await addDoc(collection(db, "production_logs"), {
                    product_sku: product,
                    units_added: Number(quantity),
                    logged_by: currentUserEmail,
                    timestamp: serverTimestamp() 
                });

                statusMsg.style.color = "green";
                statusMsg.innerText = "Success! Production logged to database.";
                document.getElementById('quantity').value = ""; 

            } catch (error) {
                console.error("Error writing document: ", error);
                statusMsg.style.color = "red";
                statusMsg.innerText = "Error: Could not save to database. Check permissions.";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            // FIX: Updated route
            signOut(auth).then(() => window.location.href = "index.html");
        });
    </script>
</body>
</html>
